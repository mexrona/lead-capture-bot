services:
  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ../credentials:/app/credentials:ro
      - bot_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leadbot
      POSTGRES_PASSWORD: leadbot
      POSTGRES_DB: leadbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadbot -d leadbot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bot_data:
  postgres_data:
